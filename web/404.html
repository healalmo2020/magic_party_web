<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="magic_party_web">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>magic_party_web</title>
  <link rel="manifest" href="manifest.json">

  <style>
    #flutter-loader {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #F8F5F7;
      z-index: 9999;
    }
    #flutter-loader .spinner {
      width: 48px;
      height: 48px;
      border: 3px solid #F8F5F7;
      border-top-color: #FF4DA3;
      border-radius: 50%;
      animation: flutter-loader-spin 0.8s linear infinite;
    }
    #flutter-loader .text {
      margin-top: 16px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: #333;
    }
    @keyframes flutter-loader-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="flutter-loader" role="status" aria-live="polite" aria-label="Cargando aplicación">
    <div class="spinner" aria-hidden="true"></div>
    <p class="text">Cargando…</p>
  </div>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" defer></script>
  <script>
    (function() {
      var loader = document.getElementById('flutter-loader');
      if (!loader) return;
      function hideLoader() {
        loader.style.display = 'none';
      }
      function isFlutterReady() {
        return document.querySelector('flt-glass-pane') != null ||
          document.querySelector('flt-scene-host') != null ||
          (document.body.children.length > 1 && document.body.lastElementChild !== loader);
      }
      if (isFlutterReady()) {
        hideLoader();
        return;
      }
      var observer = new MutationObserver(function() {
        if (isFlutterReady()) {
          observer.disconnect();
          hideLoader();
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });
    })();
  </script>
</body>
</html>
